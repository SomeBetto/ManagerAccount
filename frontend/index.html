<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-gamepad"></i>
                <span>Nexus</span>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="switchView('accounts')"><i class="fa-solid fa-users"></i> Accounts</li>
                <li onclick="switchView('characters')"><i class="fa-solid fa-user-shield"></i> Characters</li>
                <li onclick="switchView('levelzone')"><i class="fa-solid fa-chart-line"></i> LevelZone</li>
                <li onclick="switchView('dailyevent')"><i class="fa-solid fa-calendar-days"></i> Daily Event</li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <div style="display:flex; align-items:center; gap:15px;">
                    <h1 id="page-title">Accounts <span id="account-count"
                            style="font-size:1rem; opacity:0.7; font-weight:400;">(0)</span></h1>
                    <button class="icon-btn" onclick="openConfigModal()"
                        style="background:rgba(255,255,255,0.1); width:35px; height:35px; border-radius:50%;"
                        title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>

                    <button id="btn-upload-accounts" class="icon-btn" onclick="triggerUpload('accounts')"
                        style="background:rgba(255,255,255,0.1); width:35px; height:35px; border-radius:50%; display:inline-flex;"
                        title="Import Accounts CSV">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </button>
                    <input type="file" id="upload-accounts" hidden onchange="handleFileUpload('accounts', event)">

                    <button id="btn-delete-selected" class="icon-btn" onclick="deleteSelectedAccounts()"
                        style="background:rgba(239, 68, 68, 0.2); color:#ef4444; width:35px; height:35px; border-radius:50%; display:none; border-color:rgba(239, 68, 68, 0.4);"
                        title="Delete Selected">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>

                    <button id="btn-upload-characters" class="icon-btn" onclick="triggerUpload('characters')"
                        style="background:rgba(255,255,255,0.1); width:35px; height:35px; border-radius:50%; display:none;"
                        title="Import Characters CSV">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </button>
                </div>
                <button class="btn-primary" onclick="openModal()">
                    <i class="fa-solid fa-plus"></i> Add New
                </button>
            </header>

            <div id="accounts-view" class="view-section active">
                <div class="card-grid" id="accounts-grid">
                    <!-- Accounts interpolated here -->
                </div>
            </div>

            <div id="characters-view" class="view-section">
                <!-- Hidden Upload Input for Characters -->
                <input type="file" id="upload-characters" hidden onchange="handleFileUpload('characters', event)">

                <div class="filter-bar">
                    <div class="filter-group">
                        <select id="sort-by" onchange="renderCharacters()">
                            <option value="name">Sort by Name</option>
                            <option value="level">Sort by Level</option>
                            <option value="class">Sort by Class</option>
                        </select>
                        <select id="account-filter" onchange="renderCharacters()">
                            <option value="">All Accounts</option>
                        </select>
                        <select id="type-filter" onchange="renderCharacters()">
                            <option value="">All Types</option>
                            <!-- Dynamic options -->
                        </select>
                        <input type="number" id="level-filter" placeholder="Target Level" oninput="renderCharacters()"
                            style="padding: 0.5rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: white; width: 120px;">
                    </div>
                </div>
                <div class="card-grid" id="characters-grid">
                    <!-- Characters interpolated here -->
                </div>
            </div>
            <div id="levelzone-view" class="view-section">
                <header style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1;">
                        <input type="text" id="level-search" placeholder="Search leveling queue..."
                            style="padding:0.75rem; width:100%; max-width:300px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white;">
                    </div>
                    <button class="btn-primary" onclick="openLevelModal()">
                        <i class="fa-solid fa-plus"></i> Add Char to Queue
                    </button>
                </header>
                <div class="card-grid" id="level-grid">
                    <!-- Level Entries -->
                </div>
            </div>

            <div id="dailyevent-view" class="view-section">
                <header style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
                    <h2>Daily Events</h2>
                    <button class="btn-primary" onclick="openDailyEventModal()">
                        <i class="fa-solid fa-plus"></i> New Event
                    </button>
                </header>
                <div class="card-grid" id="dailyevent-grid">
                    <!-- Daily Events -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add to Level Modal -->
    <div id="level-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeLevelModal()">&times;</span>
            <h2>Add to LevelZone</h2>
            <div class="form-group">
                <label>Select Character</label>
                <select id="level-char-select" style="width:100%; margin-bottom:1rem;">
                    <!-- Options -->
                </select>
            </div>
            <div class="form-group">
                <label>Initial Priority</label>
                <input type="number" id="level-priority-input" value="1" min="1">
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea id="level-note-input" rows="3" placeholder="Max 500 chars"
                    style="width:100%; padding:0.75rem; background:rgba(15,23,42,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeLevelModal()">Cancel</button>
                <button class="btn-primary" onclick="submitLevelAdd()">Add</button>
            </div>
        </div>
    </div>

    <!-- Daily Event Modal -->
    <div id="dailyevent-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeDailyEventModal()">&times;</span>
            <h2>New Daily Event</h2>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="de-name-input">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="de-desc-input" rows="2"
                    style="width:100%; padding:0.75rem; background:rgba(15,23,42,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white;"></textarea>
            </div>
            <div class="form-group" style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>Start Date</label>
                    <input type="date" id="de-start-input">
                </div>
                <div style="flex:1;">
                    <label>End Date</label>
                    <input type="date" id="de-end-input">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeDailyEventModal()">Cancel</button>
                <button class="btn-primary" onclick="submitDailyEvent()">Save</button>
            </div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="event-details-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width:900px; width:95%;">
            <span class="close" onclick="closeEventDetailsModal()">&times;</span>
            <header style="margin-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                <h2 id="ed-title">Event Name</h2>
                <p id="ed-desc" style="opacity:0.7; font-size:0.9rem;"></p>
                <p id="ed-dates" style="opacity:0.5; font-size:0.8rem;"></p>
            </header>

            <div style="margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
                <h3>Participants</h3>
                <button class="btn-primary" onclick="openAddParticipantModal()"
                    style="padding:0.3rem 0.8rem; font-size:0.9rem;">
                    <i class="fa-solid fa-user-plus"></i> Add Character
                </button>
            </div>

            <div class="card-grid" id="ed-participants-grid"
                style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                <!-- Participants cards interpolated here -->
            </div>
        </div>
    </div>

    <!-- Add Participant Modal -->
    <div id="add-participant-modal" class="modal" style="z-index: 1002;">
        <div class="modal-content glass-panel" style="max-width:400px;">
            <span class="close" onclick="closeAddParticipantModal()">&times;</span>
            <h2>Add Participant</h2>
            <div class="form-group">
                <label>Select Character</label>
                <select id="ap-char-select" style="width:100%;">
                    <!-- Options -->
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeAddParticipantModal()">Cancel</button>
                <button class="btn-primary" onclick="submitAddParticipant()">Add</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="item-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">New Account</h2>
            <form id="item-form">
                <!-- Dynamic Fields -->
            </form>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="button" class="btn-primary" onclick="submitForm()">Save</button>
            </div>
        </div>
    </div>

    <!-- Config Modal -->
    <div id="config-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 400px;">
            <span class="close" onclick="closeConfigModal()">&times;</span>
            <h2>Settings</h2>
            <div class="form-group">
                <label>Level Threshold (+/-)</label>
                <input type="number" id="config-threshold" value="0">
                <small style="color:rgba(255,255,255,0.5); display:block; margin-top:5px;">
                    Used when filtering by "Target Level". Shows characters within this range.
                </small>
            </div>

            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 15px 0;">

            <div class="form-group">
                <label>Character Types</label>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="new-type-input" placeholder="New Type (e.g. Tank)" style="flex:1;">
                    <button type="button" class="btn-primary" onclick="addCharType()" style="padding:0 10px;"><i
                            class="fa-solid fa-plus"></i></button>
                </div>
                <div id="config-types-list" style="display:flex; flex-wrap:wrap; gap:5px;">
                    <!-- Tags injected here -->
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeConfigModal()">Close</button>
                <button type="button" class="btn-primary" onclick="saveConfig()">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
